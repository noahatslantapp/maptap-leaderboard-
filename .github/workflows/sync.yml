name: Sync maptap leaderboard

on:
  schedule:
    - cron: "*/15 * * * *"   # roughly every 15 minutes (GitHub may run a little late under load)
  workflow_dispatch: {}     # also lets you run it on demand from the Actions tab

permissions:
  contents: write

# Never let two runs publish at the same time (prevents the merge conflict).
concurrency:
  group: maptap-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull scores from Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          MAPTAP_CHANNEL_ID: C0B6XR5SKEZ
        run: python sync.py

      - name: Publish if the data changed
        run: |
          git config user.name "maptap-bot"
          git config user.email "actions@users.noreply.github.com"
          cp data.json /tmp/data.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/data.json data.json
          git add data.json
          if git diff --staged --quiet; then
            echo "No new scores to publish."
          else
            git commit -m "Update leaderboard $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push origin HEAD:main
          fi
