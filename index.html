<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>maptap leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c1420; --surface:#15202f; --surface2:#1c2a3c; --line:rgba(180,200,225,.12);
    --line2:rgba(180,200,225,.22); --ink:#ece6d6; --muted:#8ea3ba; --faint:#5d7088;
    --teal:#4fb89c; --gold:#e8be5a; --silver:#cdd3da; --bronze:#cd8e58;
    --signal:#e0654a;
    --disp:"Bricolage Grotesque",system-ui,sans-serif;
    --body:"Inter",system-ui,sans-serif;
    --mono:"Space Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.5;
    -webkit-font-smoothing:antialiased;min-height:100vh}
  .wrap{max-width:860px;margin:0 auto;padding:0 20px 80px}

  header{position:relative;padding:48px 0 28px;overflow:hidden}
  .contour{position:absolute;inset:-40% -10% auto -10%;height:340px;opacity:.16;
    pointer-events:none;z-index:0}
  header .inner{position:relative;z-index:1}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--teal);margin-bottom:10px}
  h1{font-family:var(--disp);font-weight:800;font-size:clamp(40px,8vw,68px);line-height:.92;
    letter-spacing:-.02em}
  h1 .tap{color:var(--signal)}
  .sub{color:var(--muted);margin-top:12px;font-size:15px;max-width:46ch}

  nav{display:flex;gap:4px;margin:30px 0 26px;border-bottom:1px solid var(--line);position:relative;z-index:1}
  .tab{font-family:var(--disp);font-weight:500;font-size:15px;color:var(--muted);background:none;
    border:none;padding:12px 16px;cursor:pointer;position:relative;letter-spacing:-.01em}
  .tab:hover{color:var(--ink)}
  .tab.on{color:var(--ink)}
  .tab.on::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;
    background:var(--signal)}
  .tab .ct{font-family:var(--mono);font-size:11px;color:var(--faint);margin-left:7px}

  .panel{display:none;animation:fade .25s ease}
  .panel.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .daybar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  .daybar label{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
  select,textarea,button.act{font-family:var(--body);color:var(--ink);background:var(--surface);
    border:1px solid var(--line2);border-radius:10px}
  select{padding:9px 14px;font-size:14px;cursor:pointer}
  select:focus,textarea:focus{outline:none;border-color:var(--teal)}

  .row{display:grid;grid-template-columns:54px 1fr auto;align-items:center;gap:16px;
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:14px 18px;margin-bottom:10px;transition:border-color .15s,transform .15s}
  .row:hover{border-color:var(--line2);transform:translateX(2px)}
  .row.r1{border-color:rgba(232,190,90,.4)}
  .rank{display:flex;align-items:center;justify-content:center}
  .ring{width:46px;height:46px}
  .rnum{font-family:var(--disp);font-weight:800;font-size:22px;color:var(--faint);
    width:46px;text-align:center}
  .who{min-width:0}
  .name{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:-.01em}
  .rounds{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
  .pip{font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:6px;
    background:var(--surface2);color:var(--muted)}
  .pip.hi{color:#0c1420;background:var(--teal);font-weight:700}
  .pip.lo{color:var(--signal)}
  .score{font-family:var(--mono);font-weight:700;font-size:30px;text-align:right;letter-spacing:-.02em}
  .r1 .score{color:var(--gold)} .r2 .score{color:var(--silver)} .r3 .score{color:var(--bronze)}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:26px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .card .k{font-family:var(--mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint)}
  .card .v{font-family:var(--disp);font-weight:800;font-size:30px;margin-top:6px;letter-spacing:-.02em}
  .card .v small{font-size:14px;color:var(--muted);font-weight:500;font-family:var(--body)}

  table{width:100%;border-collapse:collapse}
  th{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--faint);text-align:right;padding:10px 12px;cursor:pointer;user-select:none;
    border-bottom:1px solid var(--line2);white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th.s::after{content:" \25BE";color:var(--signal)}
  td{padding:13px 12px;text-align:right;border-bottom:1px solid var(--line);
    font-family:var(--mono);font-size:14px}
  td.pname{font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:-.01em}
  tbody tr:hover{background:var(--surface)}
  .medal{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:9px;vertical-align:1px}
  .m1{background:var(--gold)} .m2{background:var(--silver)} .m3{background:var(--bronze)}

  textarea{width:100%;min-height:190px;padding:16px;font-size:13px;font-family:var(--mono);
    line-height:1.6;resize:vertical}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  button.act{padding:11px 22px;font-weight:500;font-size:14px;cursor:pointer;
    font-family:var(--disp);transition:.15s}
  button.act:hover{border-color:var(--teal);background:var(--surface2)}
  button.go{background:var(--signal);border-color:var(--signal);color:#fff}
  button.go:hover{background:#ec7459;border-color:#ec7459}
  button.danger:hover{border-color:var(--signal);color:var(--signal)}
  .hint{color:var(--muted);font-size:13px;margin:8px 0 16px}
  .hint code{font-family:var(--mono);background:var(--surface);padding:2px 6px;border-radius:5px;font-size:12px}
  .status{font-family:var(--mono);font-size:13px;margin-top:14px;min-height:18px}
  .status.ok{color:var(--teal)} .status.err{color:var(--signal)}
  .preview{margin-top:18px}
  .preview h3{font-family:var(--disp);font-size:14px;color:var(--muted);font-weight:500;margin-bottom:10px;
    font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;font-size:11px}
  .empty{color:var(--faint);font-family:var(--mono);font-size:13px;padding:40px 0;text-align:center}
  .foot{margin-top:50px;color:var(--faint);font-size:12px;font-family:var(--mono);text-align:center}
  @media(max-width:560px){
    .row{grid-template-columns:42px 1fr;gap:10px}
    .score{grid-column:2;text-align:left;font-size:24px;margin-top:4px}
    .ring,.rnum{width:38px;height:38px}
    .tablewrap{overflow-x:auto}
  }
  .upd{font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:14px}
  .brandbar{display:flex;align-items:center;gap:9px;margin-bottom:22px}
  .brandlogo{height:28px;width:auto;display:inline-block;vertical-align:middle;filter:brightness(0) invert(1)}
  .brandword{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:.01em;color:var(--ink)}
  .brandword::before{content:"";display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--signal);margin-right:9px;vertical-align:1px;transform:rotate(12deg)}
  .rkh{width:34px;text-align:left}
  th[data-sort="name"]{text-align:left}
  td.rk{font-family:var(--mono);color:var(--faint);font-size:13px;text-align:left}
  td.rk.r1{color:var(--gold);font-weight:700}
  td.rk.r2{color:var(--silver);font-weight:700}
  td.rk.r3{color:var(--bronze);font-weight:700}
  td.pname{text-align:left}
</style>
</head>

      <div class="eyebrow">maptap.gg &middot; live standings</div>
      <h1>map<span class="tap">tap</span><br>leaderboard</h1>
      <p id="updated" class="upd"></p>
    </div>
  </header>
  <nav>
    <button class="tab on" data-tab="today">Today <span class="ct" id="ct-today"></span></button>
    <button class="tab" data-tab="all">All-time <span class="ct" id="ct-all"></span></button>
  </nav>
  <section class="panel on" id="p-today">
    <div class="daybar"><label for="daysel">Showing</label><select id="daysel"></select></div>
    <div id="dayboard"></div>
  </section>
  <section class="panel" id="p-all">
    <div class="cards" id="allcards"></div>
    <div class="tablewrap"><table id="alltable">
      <thead><tr>
        <th class="rkh">#</th>
        <th data-sort="name">Player</th>
        <th data-sort="avg" class="s">Avg</th>
        <th data-sort="total">Total</th>
        <th data-sort="days">Days</th>
        <th data-sort="best">Best</th>
        <th data-sort="wins">Wins</th>
      </tr></thead>
      <tbody id="allbody"></tbody>
    </table></div>
  </section>
  <div class="foot">Pulled automatically from #maptap &middot; tap a column header to re-rank.</div>
</div>
<script>
const $ = s => document.querySelector(s);
let DATA = { days:{} };
let sortKey="avg", sortDir=-1;
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function ringSVG(rank){
  const c={1:"#e8be5a",2:"#cdd3da",3:"#cd8e58"}[rank];
  return '<svg class="ring" viewBox="0 0 46 46" aria-hidden="true"><circle cx="23" cy="23" r="20" fill="none" stroke="'+c+'" stroke-width="2.2"/><circle cx="23" cy="23" r="12" fill="none" stroke="'+c+'" stroke-width="2.2" opacity=".55"/><circle cx="23" cy="23" r="4" fill="'+c+'"/></svg>';
}
function pip(v){const cls=v>=95?"hi":(v<70?"lo":"");return '<span class="pip '+cls+'">'+v+'</span>';}
function renderDay(dk){
  const box=$("#dayboard"); const day=DATA.days[dk];
  if(!day){box.innerHTML='<div class="empty">No scores for this day.</div>';return;}
  const sorted=[...day.results].sort((a,b)=>b.finalScore-a.finalScore);
  box.innerHTML=sorted.map((r,i)=>{const rank=i+1;
    const badge=rank<=3?ringSVG(rank):'<div class="rnum">'+rank+'</div>';
    return '<div class="row r'+rank+'"><div class="rank">'+badge+'</div><div class="who"><div class="name">'+esc(r.name)+'</div><div class="rounds">'+(r.rounds||[]).map(pip).join("")+'</div></div><div class="score">'+r.finalScore+'</div></div>';
  }).join("");
}
function aggregate(){
  const p={};
  Object.values(DATA.days).forEach(day=>{
    if(!day.results.length)return;
    const max=Math.max(...day.results.map(r=>r.finalScore));
    day.results.forEach(r=>{if(!p[r.name])p[r.name]={name:r.name,scores:[],wins:0};p[r.name].scores.push(r.finalScore);if(r.finalScore===max)p[r.name].wins++;});
  });
  return Object.values(p).map(x=>{const total=x.scores.reduce((a,b)=>a+b,0);const days=x.scores.length;return {name:x.name,days,total,avg:Math.round(total/days),best:Math.max(...x.scores),wins:x.wins};});
}
function renderAll(){
  const rows=aggregate(); const ndays=Object.keys(DATA.days).length;
  const leader=[...rows].sort((a,b)=>b.avg-a.avg)[0];
  const mostWins=[...rows].sort((a,b)=>b.wins-a.wins)[0];
  $("#allcards").innerHTML='<div class="card"><div class="k">Players</div><div class="v">'+rows.length+'</div></div><div class="card"><div class="k">Days tracked</div><div class="v">'+ndays+'</div></div><div class="card"><div class="k">Top average</div><div class="v">'+(leader?esc(leader.name.split(" ")[0]):"&mdash;")+' <small>'+(leader?leader.avg:"")+'</small></div></div><div class="card"><div class="k">Most wins</div><div class="v">'+((mostWins&&mostWins.wins)?esc(mostWins.name.split(" ")[0]):"&mdash;")+' <small>'+((mostWins&&mostWins.wins)?mostWins.wins:"")+'</small></div></div>';
  rows.sort((a,b)=>sortKey==="name"?sortDir*a.name.localeCompare(b.name):sortDir*(a[sortKey]-b[sortKey]));
  $("#allbody").innerHTML=rows.map((r,i)=>{const n=i+1;const rc=n<=3?(" r"+n):"";return '<tr><td class="rk'+rc+'">'+n+'</td><td class="pname">'+esc(r.name)+'</td><td>'+r.avg+'</td><td>'+r.total.toLocaleString()+'</td><td>'+r.days+'</td><td>'+r.best+'</td><td>'+r.wins+'</td></tr>';}).join("");
  document.querySelectorAll("#alltable th").forEach(th=>th.classList.toggle("s",th.dataset.sort===sortKey));
}
function renderDaySelect(){
  const sel=$("#daysel"); const keys=Object.keys(DATA.days).sort().reverse();
  sel.innerHTML=keys.map(k=>'<option value="'+k+'">'+esc(DATA.days[k].label)+' &nbsp;&middot;&nbsp; '+DATA.days[k].results.length+' players</option>').join("");
  $("#ct-today").textContent=keys.length||"";
  const ps=new Set();Object.values(DATA.days).forEach(d=>d.results.forEach(r=>ps.add(r.name.toLowerCase())));
  $("#ct-all").textContent=ps.size||"";
  if(keys.length){sel.value=keys[0];renderDay(keys[0]);}else $("#dayboard").innerHTML='<div class="empty">No data yet.</div>';
}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));document.querySelectorAll(".panel").forEach(x=>x.classList.remove("on"));t.classList.add("on");$("#p-"+t.dataset.tab).classList.add("on");});
$("#daysel").onchange=e=>renderDay(e.target.value);
document.querySelectorAll("#alltable th").forEach(th=>th.onclick=()=>{const k=th.dataset.sort;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=k==="name"?1:-1;}renderAll();});
(async()=>{
  try{
    const res=await fetch("data.json?t="+Date.now());
    if(!res.ok) throw new Error(res.status);
    DATA=await res.json();
  }catch(e){ $("#dayboard").innerHTML='<div class="empty">Could not load data.json yet.</div>'; return; }
  if(DATA.generated){$("#updated").textContent="Last updated "+new Date(DATA.generated).toLocaleString();}
  renderDaySelect(); renderAll();
})();
</script>
</body>
</html>
